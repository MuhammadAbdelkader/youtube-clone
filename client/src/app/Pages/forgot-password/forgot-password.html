<div class="auth-page">
  <div class="auth-card glass-card fade-in">
    <!-- Brand Logo -->
    <div class="brand-logo">
      <div class="flex items-center justify-center bg-red-600 rounded-xl w-10 h-10 shadow-lg shadow-red-500/40">
        <svg class="w-5 h-5 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <span class="logo-text">YouCube</span>
    </div>

    <h2 class="text-center font-display mb-1 text-2xl font-bold">Forgot Password</h2>
    <p class="auth-subtitle text-center text-muted mb-4" style="font-size: 14px;">Enter your email to reset your password</p>

    <!-- Error/Success Alerts -->
    @if (errorMessage) {
      <div class="bg-red-50 text-red-700 border border-red-200 rounded-lg p-3 text-sm font-medium mb-4">
        {{ errorMessage }}
      </div>
    }
    @if (successMessage) {
      <div class="bg-green-50 text-green-700 border border-green-200 rounded-lg p-3 text-sm font-medium mb-4">
        {{ successMessage }}
      </div>
    }

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <!-- Email Field -->
      <div>
        <label for="email" class="form-label block mb-1">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-input w-full"
          placeholder="name@example.com"
          [class.is-invalid]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
        />
        <div class="error-container">
          @if (forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched) {
            <span class="field-error text-red-500 text-xs mt-1">Please enter a valid email.</span>
          }
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-full mt-2"
        [disabled]="forgotForm.invalid || loading"
      >
        @if (loading) {
          <span class="spinner"></span> Sending...
        } @else {
          Send Recovery Email
        }
      </button>
    </form>

    <div class="text-center mt-6 text-sm text-muted">
      Remembered your password?
      <a routerLink="/login" class="text-accent font-medium ml-1">Sign In</a>
    </div>
  </div>
</div>
