<div class="main-feed-container">

  @if (!loading && videos.length === 0) {
    <!-- Empty State Component -->
    <div class="d-flex flex-column align-items-center justify-content-center text-center p-5 mt-5">
      <div class="empty-state-icon mb-4" style="background: #f1f5f9; padding: 2rem; border-radius: 50%;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
          <line x1="7" y1="2" x2="7" y2="22"></line>
          <line x1="17" y1="2" x2="17" y2="22"></line>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <line x1="2" y1="7" x2="7" y2="7"></line>
          <line x1="2" y1="17" x2="7" y2="17"></line>
          <line x1="17" y1="17" x2="22" y2="17"></line>
          <line x1="17" y1="7" x2="22" y2="7"></line>
        </svg>
      </div>
      <h2 class="fw-bold mb-2" style="color: var(--text-main);">No Streams Available Yet</h2>
      <p class="text-muted mb-4 fs-5">Be the first to build the grid! Upload a video to get started.</p>
      <a routerLink="/createvideo" class="btn btn-primary btn-lg px-4 rounded-pill shadow-sm">
        <i class="fa-solid fa-plus me-2"></i> Upload Video
      </a>
    </div>
  } @else {
    <!-- Responsive grid: auto-fill naturally adjusts column count to the
         viewport, same proven pattern used on the Explore page. The previous
         version used Tailwind's grid-cols-*/sm:/md:/lg: classes, but Tailwind
         was never installed in this project, so none of them did anything --
         this page had no working responsive layout at all. -->
    <div class="feed-grid">
      @for (video of videos; track video._id) {
        <div class="video-card-container">
          <a [routerLink]="['/video-details', video._id]" class="text-decoration-none d-block" style="color: var(--text-main);">
            <div class="card h-100 shadow-sm border-0 video-card">
              <!-- Always a lightweight image, never a live <video> tag in a
                   grid -- loading a decoder per card was a real performance
                   cost. If no thumbnail was generated, derive one from the
                   video itself instead of falling back to an inline player. -->
              <img [src]="(video.thumbnailUrl || video.videoUrl) | cloudinary:'thumbnail'" class="card-img-top rounded-top" [alt]="video.title" style="height: 200px; object-fit: cover;" />

              <div class="card-body">
                <h6 class="card-title fw-bold text-truncate mb-1" title="{{ video.title }}">
                  {{ video.title }}
                </h6>
                <p class="card-text text-muted small mb-1 text-truncate" title="{{ video.description }}">
                  {{ video.description }}
                </p>
                <p class="card-text text-muted small fw-medium">
                  <i class="fa-regular fa-eye me-1"></i> {{ video.views }} views
                </p>
              </div>
            </div>
          </a>
        </div>
      }
    </div>
  }
</div>
